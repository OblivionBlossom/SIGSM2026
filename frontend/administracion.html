<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid p-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card border-light shadow-sm">
                    <div class="card-header bg-info text-white p-3">
                       <h5 class="mb-0 fw-bold d-flex align-items-center"><img src="logoHospi.jpg" alt="Hospital" class="me-2" style="height: 24px; width: auto; object-fit: contain;">Cargar Documento</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="form-label text-dark fw-bold small">Nombre de Documento</label>
                            <input type="text" class="form-control bg-info-subtle text-muted" placeholder="Ej: prostatectomía radical">
                            <label class="form-label text-dark fw-bold small">Departamento (servicio del hospital)</label>
                            <select class="form-select bg-info-subtle text-muted">
                                <option selected>Selecciona una categoría</option>
                               <option value="1" class="bg-white text-dark">Opcion1</option>
                                <option value="2" class="bg-white text-dark">Opcion2</option>
                            </select>
                            <label class="form-label text-dark fw-bold small">Tipo de documento</label>
                            <select class="form-select bg-info-subtle text-muted">
                               <option selected>Estudio-Prevencion</option>
                               <option value="1" class="bg-white text-dark">Estudio</option>
                               <option value="2" class="bg-white text-dark">Prevencion</option>
                            </select>
                            <label class="form-label text-dark fw-bold small">Fecha</label>
                            <input type="date" class="form-control bg-info-subtle text-muted">
                            <label class="form-label text-dark fw-bold small">Email de departamento</label>
                            <input type="email" class="form-control bg-info-subtle text-muted" placeholder="departamento@hc.edu.uy">
                            <label for="formFile" class="form-label text-dark fw-bold small">Archivo PDF</label>
                            <input class="form-control bg-info-subtle text-muted" type="file" id="formFile">
                            <div class="d-grid col-6 mx-auto  mt-4">
                            <button type="button" class="btn bg-info fw-bold text-white p-2">
                                Cargar documento
                            </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
